<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Danh sách sinh viên</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
    button { margin-bottom: 20px; }
    table { border-collapse: collapse; width: 100%; text-align: center; }
    th, td { border: 1px solid black; padding: 5px; }
</style>
</head>

<body>

<h2 style="text-align:center;">DANH SÁCH SINH VIÊN</h2>

<button onclick="chonFile()">Chọn file Excel</button>
<input type="file" id="fileInput" style="display:none;">

<table>
    <tr>
        <th>STT</th>
        <th>Họ tên</th>
        <th>Mã SV</th>
        <th>Email</th>
        <th>Khóa</th>
        <th>Khoa</th>
    </tr>
    <tbody id="ds"></tbody>
</table>

<script>

// mở file
function chonFile() {
    document.getElementById("fileInput").click();
}

// bỏ dấu
function boDau(s) {
    return s.normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .replace(/đ/g, "d")
            .replace(/Đ/g, "d");
}

// khi chọn file
document.getElementById("fileInput").onchange = function(e) {

    var file = e.target.files[0];
    var reader = new FileReader();

    reader.onload = function(e) {

        var data = new Uint8Array(e.target.result);
        var wb = XLSX.read(data, {type: "array"});
        var sheet = wb.Sheets[wb.SheetNames[0]];

        var arr = XLSX.utils.sheet_to_json(sheet, {header:1});

        var html = "";

        for (var i = 1; i < arr.length; i++) {

            var stt = arr[i][0];
            var msv = arr[i][1];
            var ten = arr[i][2]; // giữ nguyên hiển thị

            if (ten && msv) {

                // 👉 chỉ xử lý email (xóa LT)
                var tenEmail = ten.replace(/\(lt\)/gi, "");

                var t = boDau(tenEmail.toLowerCase());
                var a = t.trim().split(" ");

                var tenCuoi = a[a.length - 1];

                var vietTat = "";
                for (var j = 0; j < a.length - 1; j++) {
                    vietTat += a[j][0];
                }

                var email = tenCuoi + vietTat + "." + msv.toLowerCase() + "@hvnh.edu.vn";

                // khóa
                var khoaHoc = "K" + msv.substring(0,2);

                // khoa
                var ma = msv.substring(3,6);
                var khoa = "Không rõ";

                if (ma == "404") khoa = "Công nghệ thông tin & Kinh tế số";

                // hiển thị (GIỮ NGUYÊN TÊN)
                html += "<tr>" +
                    "<td>" + stt + "</td>" +
                    "<td>" + ten + "</td>" +
                    "<td>" + msv + "</td>" +
                    "<td>" + email + "</td>" +
                    "<td>" + khoaHoc + "</td>" +
                    "<td>" + khoa + "</td>" +
                "</tr>";
            }
        }

        document.getElementById("ds").innerHTML = html;
    };

    reader.readAsArrayBuffer(file);
};

</script>

</body>
</html>
