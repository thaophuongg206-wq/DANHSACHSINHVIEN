<script>
// ===== HÀM BỎ DẤU =====
function removeVietnameseTones(str) {
    return str
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/đ/g, "d")
        .replace(/Đ/g, "d")
        .replace(/[^a-zA-Z0-9 ]/g, "");
}

// ===== CLASS =====
class Student {
    constructor(stt, fullName, studentId) {
        this.stt = stt;
        this.fullName = fullName;
        this.studentId = studentId;
        this.email = this.createEmail();
        this.course = this.getCourse();
        this.faculty = this.getFaculty();
    }

    createEmail() {
        let name = this.fullName.replace("(LT)", "").trim();
        name = removeVietnameseTones(name.toLowerCase());

        let parts = name.split(" ");
        let lastName = parts.pop();
        let initials = parts.map(p => p[0]).join("");

        return lastName + initials + "." + this.studentId.toLowerCase() + "@hvnh.edu.vn";
    }

    getCourse() {
        return "K" + this.studentId.substring(0, 2);
    }

    getFaculty() {
        let code = this.studentId.substring(3, 6);

        let map = {
            "404": "Công nghệ thông tin & Kinh tế số",
            "402": "Kế toán kiểm toán",
            "408": "Khoa học dữ liệu",
            "405": "Kinh doanh quốc tế",
            "407": "Kinh tế đầu tư",
            "406": "Luật kinh tế",
            "401": "Ngân hàng - Tài chính",
            "751": "An toàn thông tin",
            "403": "QTKD / Du lịch"
        };

        return map[code] || "Không rõ";
    }
}
